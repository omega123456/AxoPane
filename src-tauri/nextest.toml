# cargo-nextest config (workspace root for this crate).
# https://nexte.st/book/configuration.html

[profile.default]
fail-fast = false
test-threads = "num-cpus"
# Which integration binaries run is set in the repo-root `.cargo/config.toml` aliases
# (`gm-test-integration`, `gm-llvm-cov`) via repeated `--test <name>`.
# Integration tests may block on I/O or filesystem watching; avoid false "hung test" kills.
slow-timeout = { period = "120s", terminate-after = 2 }
# End-of-run summary: list slow tests alongside pass/fail totals.
final-status-level = "slow"
